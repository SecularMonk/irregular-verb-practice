services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./data/irregular_verbs.db
      FRONTEND_ORIGIN: http://localhost:5173
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    command: >
      sh -c "python -m app.db.seed_questions &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
